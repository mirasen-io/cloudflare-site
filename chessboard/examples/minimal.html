<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mirasen Chessboard — Minimal CDN Example</title>

    <script type="importmap">
      {
        "imports": {
          "@ktarmyshov/assert": "https://cdn.jsdelivr.net/npm/@ktarmyshov/assert/+esm",
          "es-toolkit": "https://cdn.jsdelivr.net/npm/es-toolkit/+esm"
        }
      }
    </script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f2ea;
      }

      #board {
        width: min(420px, calc(100vw - 32px));
        height: min(420px, calc(100vw - 32px));
        display: block;
        overflow: hidden;
      }

      #board svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="board"></div>

    <script type="module">
      import { createBoard } from "https://cdn.jsdelivr.net/npm/@mirasen/chessboard/+esm";
      import { builtInExtensionFactoryMap } from "https://cdn.jsdelivr.net/npm/@mirasen/chessboard/extensions/+esm";

      const boardElement = document.getElementById("board");

      if (!boardElement) {
        throw new Error("Board element not found");
      }

      const chessnutBaseUrl =
        "https://cdn.jsdelivr.net/npm/@mirasen/chessboard/assets/pieces/chessnut/";

      const pieceUrls = {
        wK: `${chessnutBaseUrl}wK.svg`,
        wQ: `${chessnutBaseUrl}wQ.svg`,
        wR: `${chessnutBaseUrl}wR.svg`,
        wB: `${chessnutBaseUrl}wB.svg`,
        wN: `${chessnutBaseUrl}wN.svg`,
        wP: `${chessnutBaseUrl}wP.svg`,
        bK: `${chessnutBaseUrl}bK.svg`,
        bQ: `${chessnutBaseUrl}bQ.svg`,
        bR: `${chessnutBaseUrl}bR.svg`,
        bB: `${chessnutBaseUrl}bB.svg`,
        bN: `${chessnutBaseUrl}bN.svg`,
        bP: `${chessnutBaseUrl}bP.svg`,
      };

      createBoard({
        element: boardElement,
        extensions: [
          builtInExtensionFactoryMap.renderer({
            pieceUrls,
          }),
          "selectedSquare",
          "lastMove",
          "activeTarget",
          "legalMoves",
          "events",
          "autoPromote",
          "promotion",
        ],
      });
    </script>
  </body>
</html>
